name: deploy-apps-script

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend-apps-script/**"
      - "sheets/**"
      - ".github/workflows/deploy-apps-script.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-apps-script-main
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      - name: Restore clasp auth
        run: |
          cat > ~/.clasprc.json << 'JSON'
          ${{ secrets.CLASPRC_JSON }}
          JSON

      - name: Create .clasp.json
        run: |
          cat > .clasp.json << 'JSON'
          {
            "scriptId": "${{ secrets.APPS_SCRIPT_SCRIPT_ID }}",
            "rootDir": "backend-apps-script"
          }
          JSON

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.CLASPRC_JSON }}" || (echo "Missing CLASPRC_JSON" && exit 1)
          test -n "${{ secrets.APPS_SCRIPT_SCRIPT_ID }}" || (echo "Missing APPS_SCRIPT_SCRIPT_ID" && exit 1)
          test -n "${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}" || (echo "Missing APPS_SCRIPT_DEPLOYMENT_ID" && exit 1)

      - name: Push source
        run: clasp push --force

      - name: Deploy to fixed Web App URL
        run: |
          clasp deploy --deploymentId "${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}" --description "CI ${GITHUB_SHA}"

      - name: Open web app info
        run: clasp open-web-app || true
