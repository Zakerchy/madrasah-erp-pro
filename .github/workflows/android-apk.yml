name: build-android-apk

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "mobile-app/**"
      - "backend-apps-script/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android platform scaffold exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
        run: |
          URL="${APPS_SCRIPT_URL:-$API_BASE_URL}"
          if [ -n "$URL" ]; then
            DEFINE_ARG="--dart-define=APPS_SCRIPT_URL=$URL"
          elif [ -n "$APPS_SCRIPT_DEPLOYMENT_ID" ]; then
            DEFINE_ARG="--dart-define=APPS_SCRIPT_DEPLOYMENT_ID=$APPS_SCRIPT_DEPLOYMENT_ID"
          else
            echo "Missing APPS_SCRIPT_URL/API_BASE_URL/APPS_SCRIPT_DEPLOYMENT_ID secret" >&2
            exit 1
          fi
          flutter build apk --debug \
            "$DEFINE_ARG"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: madrasah-erp-lite-debug-apk
          path: mobile-app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Publish/Update Latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: Latest APK
          allowUpdates: true
          removeArtifacts: true
          artifacts: mobile-app/build/app/outputs/flutter-apk/app-debug.apk
          artifactErrorsFailBuild: true
