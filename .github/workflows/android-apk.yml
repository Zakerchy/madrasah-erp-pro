name: build-android-apk

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android platform scaffold exists
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Resolve API URL
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          FALLBACK_URL="https://script.google.com/macros/s/AKfycbzdFMBIbvNlFthecYbR9XlEe7BhRaWaMuomWWPfwsiB3kG0CmjuagH3_rszNmr7WJc7/exec"
          if [ -n "$API_BASE_URL" ]; then
            RESOLVED_API_URL="$API_BASE_URL"
          else
            RESOLVED_API_URL="$FALLBACK_URL"
          fi

          echo "$RESOLVED_API_URL" | grep -q "script.google.com/macros/s/" || (echo "Resolved API URL invalid" && exit 1)
          echo "$RESOLVED_API_URL" | grep -q "/exec" || (echo "Resolved API URL must end with /exec" && exit 1)

          echo "RESOLVED_API_URL=$RESOLVED_API_URL" >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug --dart-define=API_BASE_URL="$RESOLVED_API_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: madrasah-erp-lite-debug-apk
          path: mobile-app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Publish/Update Latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: Latest APK
          allowUpdates: true
          removeArtifacts: true
          artifacts: mobile-app/build/app/outputs/flutter-apk/app-debug.apk
          artifactErrorsFailBuild: true
