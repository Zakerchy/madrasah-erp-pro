name: local-check-smoke

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run migration
        run: npm run migrate
      - name: Start local checker
        run: npm run check:server &
      - name: Wait for server
        run: sleep 2
      - name: Run smoke
        run: npm run check:smoke
